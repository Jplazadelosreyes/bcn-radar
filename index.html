<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- viewport-fit=cover es OBLIGATORIO para que env(safe-area-inset-*) devuelva algo:
         sin él, todo el margen que reservamos para el notch y la barra del iPhone valía 0. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- Tiñe la barra del navegador con el fondo de la app: se pierde la costura del "sitio web" -->
    <meta name="theme-color" content="#E7ECEC" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0C161C" media="(prefers-color-scheme: dark)" />
    <!-- Si se añade a la pantalla de inicio, abre a pantalla completa (sin barra de direcciones) -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;0,600;0,700;0,800;1,500;1,600&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500;1,600&family=Figtree:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <title>BCN Radar · Escáner de propiedad de Barcelona</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
